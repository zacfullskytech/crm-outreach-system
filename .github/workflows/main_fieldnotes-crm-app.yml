# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - fieldnotes-crm-app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build
          npm run test --if-present

      - name: Prepare deployment package
        run: |
          mkdir -p release
          cp package.json release/
          cp package-lock.json release/
          cp next.config.ts release/
          cp -R .next release/.next
          cp -R node_modules release/node_modules
          cp -R app release/app
          cp -R components release/components
          cp -R lib release/lib
          cp -R prisma release/prisma
          cp -R scripts release/scripts
          if [ -d public ]; then cp -R public release/public; fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_33F79F1D76164A998DB50EBC7A1CE154 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5895112F110F47A5A15C1B46F828D6C3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_22C093122E2A4666A6499A45F1DB96EB }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fieldnotes-crm-app'
          slot-name: 'Production'
          package: .
          